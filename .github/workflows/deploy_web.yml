# Builds the Flutter web bundle and publishes it to GitHub Pages.
#
# Prerequisites (once per repo):
# - Settings → Pages → Source: GitHub Actions
#
# Base href: defaults to "/<repository-name>/" for project sites
# (https://<user>.github.io/<repo>/). If you use a user/org site repo
# (<user>.github.io), change --base-href to "/" in the Build step below.

name: Deploy web

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: >-
          flutter build web --release
          --base-href "/${{ github.event.repository.name }}/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
